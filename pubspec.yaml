name: smartattend
description: "A new Flutter project."

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# Version and build number for your application.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  provider: ^6.1.5+1
  lottie: ^3.3.2
  shared_preferences: ^2.5.4
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  geolocator: ^14.0.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  intl: ^0.20.2
  pdf: ^3.12.0
  printing: ^5.14.3



# Development dependencies
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# Configuration for flutter_launcher_icons
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/SmartAttendance.png"
  adaptive_icon_background: "#ffffff" # optional for Android adaptive icon
  remove_alpha_ios: true              # removes extra transparent padding on iOS

# Flutter-specific settings
flutter:
  uses-material-design: true

  # Add assets to your application here
  assets:
    - assets/images/SmartAttend.png
    - assets/images/facebook.png
    - assets/images/google.png
    - assets/images/SmartAttendance.png
    - assets/animation/

  # Add custom fonts here
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
